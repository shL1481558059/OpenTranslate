<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Selection</title>
    <script src="./theme-bootstrap.js?v=1"></script>
    <link rel="stylesheet" href="./selection.css" />
  </head>
  <body>
    <div id="hint">Drag to select area. Press ESC to cancel.</div>
    <svg id="mask" xmlns="http://www.w3.org/2000/svg">
      <path id="mask-shade" fill="rgba(20, 20, 20, 0.4)" fill-rule="evenodd" clip-rule="evenodd"></path>
      <g id="mask-outline"></g>
    </svg>
    <div id="selection"></div>
    <script src="./selection.js"></script>
  </body>
</html>
