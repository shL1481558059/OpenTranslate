<!doctype html>
<html lang="zh-CN" class="wa-theme-default wa-brand-indigo">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings</title>
    <link rel="stylesheet" href="../../node_modules/@awesome.me/webawesome/dist-cdn/styles/webawesome.css" />
    <link rel="stylesheet" href="./theme.css?v=3" />
    <link rel="stylesheet" href="./settings.css?v=5" />
  </head>
  <body>
    <main class="page page-settings">
      <section class="shell">
        <header class="shell-header">
          <div class="shell-copy">
            <h1>翻译设置</h1>
            <p>接口、语言和快捷键都集中在这里，结构尽量保持简单直接。</p>
          </div>

          <div class="actions">
            <wa-button id="backBtn" appearance="plain" variant="neutral">返回</wa-button>
            <wa-button id="saveBtn" form="settingsForm" type="submit" variant="brand">保存设置</wa-button>
          </div>
        </header>

        <wa-callout id="status" class="status-callout" appearance="outlined" variant="neutral" size="small" hidden></wa-callout>

        <form id="settingsForm" class="settings-grid">
          <section class="section-block">
            <div class="section-head">
              <h2>翻译模式</h2>
              <p>选择走翻译接口，还是直接连接 LLM。</p>
            </div>

            <wa-select id="engine" label="模式">
              <wa-option value="api">翻译接口</wa-option>
              <wa-option value="llm">直连 LLM</wa-option>
            </wa-select>
          </section>

          <section class="section-block">
            <div class="section-head">
              <h2>语言</h2>
              <p>手动翻译和截图翻译会共用这里的默认语言。</p>
            </div>

            <div class="two-col">
              <wa-input
                id="sourceLang"
                label="源语言"
                placeholder="auto"
                hint="例如 auto、en、ja、zh-CN"
                autocomplete="off"
              ></wa-input>

              <wa-input id="targetLang" label="目标语言" placeholder="zh-CN" autocomplete="off"></wa-input>
            </div>
          </section>

          <section id="apiSection" class="section-block">
            <div class="section-head">
              <h2>接口配置</h2>
              <p>翻译接口模式下会使用这里的地址。</p>
            </div>

            <wa-input
              id="translationApiUrl"
              label="翻译接口地址"
              placeholder="http://127.0.0.1:8787/v1/translate"
              autocomplete="off"
            ></wa-input>
          </section>

          <section id="llmFields" class="section-block">
            <div class="section-head">
              <h2>LLM 配置</h2>
              <p>支持 OpenAI 兼容接口。</p>
            </div>

            <div class="settings-stack">
              <wa-input
                id="llmApiUrl"
                label="LLM API 地址"
                placeholder="https://api.openai.com/v1"
                autocomplete="off"
              ></wa-input>

              <div class="two-col">
                <wa-input id="llmApiKey" label="LLM API Key" type="password" password-toggle autocomplete="off"></wa-input>
                <wa-input id="llmModel" label="LLM Model" placeholder="gpt-4o-mini" autocomplete="off"></wa-input>
              </div>
            </div>
          </section>

          <section class="section-block">
            <div class="section-head">
              <h2>快捷键</h2>
              <p>点击输入框后按组合键绑定，按 Esc 可清空。</p>
            </div>

            <wa-input id="hotkey" label="截图快捷键" placeholder="点击后按下组合键" autocomplete="off"></wa-input>
          </section>
        </form>
      </section>
    </main>

    <script type="module" src="./settings.js?v=5"></script>
  </body>
</html>
