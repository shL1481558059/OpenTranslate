<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manual Translate</title>
    <link rel="stylesheet" href="./translate.css" />
  </head>
  <body>
    <main class="page">
      <header class="top">
        <div>
          <p class="label">Manual Translate</p>
          <h1>手动翻译</h1>
          <p class="desc">把文本贴进来，输出为目标语言。支持多行。</p>
        </div>
        <div class="actions">
          <button id="translateBtn">翻译</button>
          <button id="copyBtn" class="ghost" disabled>复制结果</button>
          <button id="settingsBtn" class="ghost" type="button">设置</button>
        </div>
      </header>

      <div id="status" class="status"></div>

      <section class="lang">
        <div class="lang-field">
          <label for="sourceLang">源语言</label>
          <input id="sourceLang" list="langList" type="text" placeholder="auto" />
        </div>
        <div class="lang-field">
          <label for="targetLang">目标语言</label>
          <input id="targetLang" list="langList" type="text" placeholder="zh-CN" />
        </div>
      </section>

      <section class="grid">
        <div class="block">
          <label for="input">输入文本</label>
          <textarea id="input" placeholder="请输入要翻译的文本"></textarea>
        </div>
        <div class="block">
          <label>翻译结果</label>
          <pre id="output" class="output"></pre>
        </div>
      </section>

    </main>

    <datalist id="langList">
      <option value="auto">自动检测</option>
      <option value="zh-CN">简体中文</option>
      <option value="zh-TW">繁体中文</option>
      <option value="en">英语</option>
      <option value="ja">日语</option>
      <option value="ko">韩语</option>
      <option value="fr">法语</option>
      <option value="de">德语</option>
      <option value="es">西班牙语</option>
      <option value="ru">俄语</option>
      <option value="pt">葡萄牙语</option>
      <option value="it">意大利语</option>
      <option value="ar">阿拉伯语</option>
      <option value="hi">印地语</option>
      <option value="th">泰语</option>
      <option value="vi">越南语</option>
      <option value="id">印尼语</option>
      <option value="tr">土耳其语</option>
      <option value="nl">荷兰语</option>
      <option value="pl">波兰语</option>
      <option value="uk">乌克兰语</option>
      <option value="sv">瑞典语</option>
    </datalist>

    <script src="./translate.js"></script>
  </body>
</html>
