<!doctype html>
<html lang="zh-CN" class="wa-theme-default wa-brand-indigo">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manual Translate</title>
    <link rel="stylesheet" href="../../node_modules/@awesome.me/webawesome/dist-cdn/styles/webawesome.css" />
    <link rel="stylesheet" href="./theme.css?v=3" />
    <link rel="stylesheet" href="./translate.css?v=5" />
  </head>
  <body>
    <div class="window-drag-region" aria-hidden="true"></div>
    <main class="page page-translate">
      <section class="shell">
        <header class="shell-header">
          <div class="shell-copy">
            <h1>手动翻译</h1>
            <p>把文本粘贴进来直接翻译，输入和结果并排放，操作尽量一步到位。</p>
          </div>

          <div class="actions">
            <wa-button id="translateBtn" variant="brand">翻译</wa-button>
            <wa-button id="copyBtn" appearance="outlined" variant="neutral" disabled>复制结果</wa-button>
            <wa-button id="settingsBtn" appearance="plain" variant="neutral">设置</wa-button>
          </div>
        </header>

        <wa-callout id="status" class="status-callout" appearance="outlined" variant="neutral" size="small" hidden></wa-callout>

        <section class="language-grid">
          <wa-input
            id="sourceLang"
            label="源语言"
            placeholder="auto"
            hint="支持 auto、en、ja、zh-CN"
            autocomplete="off"
          ></wa-input>

          <wa-input
            id="targetLang"
            label="目标语言"
            placeholder="zh-CN"
            hint="建议填写明确目标语言"
            autocomplete="off"
          ></wa-input>
        </section>

        <section class="editor-grid">
          <wa-textarea
            id="input"
            label="输入文本"
            hint="支持多行输入"
            rows="15"
            resize="none"
            placeholder="请输入要翻译的文本"
          ></wa-textarea>

          <wa-textarea
            id="output"
            label="翻译结果"
            hint="完成后可直接复制"
            rows="15"
            resize="none"
            readonly
            placeholder="翻译结果会显示在这里。"
          ></wa-textarea>
        </section>
      </section>
    </main>

    <script type="module" src="./translate.js?v=5"></script>
  </body>
</html>
